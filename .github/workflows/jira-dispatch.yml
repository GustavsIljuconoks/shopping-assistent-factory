name: Handle Jira Manual Trigger

on:
  repository_dispatch:
    types: [jira_manual_button]
  workflow_dispatch:
    inputs:
      issue_key:
        description: "Jira issue key (e.g., TDS-7) for manual run"
        required: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: tdf-dispatch-${{ github.event.client_payload.issue_key || github.event.inputs.issue_key }}
  cancel-in-progress: false

jobs:
  handle:
    runs-on: [self-hosted, macOS, dark-factory]
    timeout-minutes: 30
    env:
      ISSUE_KEY: ${{ github.event.client_payload.issue_key || github.event.inputs.issue_key }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GH_PR_TOKEN }}
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare ticket context
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: node .github/scripts/jira-dispatch.mjs prepare-dispatch

      - name: Run Codex
        if: env.SHOULD_RUN == 'true'
        id: codex
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p "$RUN_DIR"
          last_msg="$RUN_DIR/last_message.txt"
          events_log="$RUN_DIR/events.jsonl"
          : > "$last_msg"
          : > "$events_log"

          codex exec \
            --json \
            --skip-git-repo-check \
            --output-last-message "$last_msg" \
            --dangerously-bypass-approvals-and-sandbox \
            --cd "$GITHUB_WORKSPACE" \
            - < "$PROMPT_FILE" 2>&1 | tee "$events_log"
          rc=${PIPESTATUS[0]}

          if [ "$rc" -eq 0 ]; then
            echo "CONCLUSION=success" >> "$GITHUB_ENV"
          else
            echo "CONCLUSION=failure" >> "$GITHUB_ENV"
          fi
          echo "EXECUTION_FILE=$events_log" >> "$GITHUB_ENV"
          echo "LAST_MESSAGE_FILE=$last_msg" >> "$GITHUB_ENV"
          # Always exit 0; final-status step decides overall workflow outcome.
          exit 0

      - name: Record run outputs
        if: env.SHOULD_RUN == 'true'
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          ACTION_SESSION_ID: ""
          CONCLUSION: ${{ env.CONCLUSION }}
          EXECUTION_FILE: ${{ env.EXECUTION_FILE }}
          LAST_MESSAGE_FILE: ${{ env.LAST_MESSAGE_FILE }}
        run: node .github/scripts/jira-dispatch.mjs record-run

      - name: Commit changes
        if: env.SHOULD_RUN == 'true'
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: node .github/scripts/jira-dispatch.mjs commit-changes

      - name: Ensure pull request (PR mode)
        if: env.SHOULD_RUN == 'true' && env.KIND == 'pr'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GH_PR_TOKEN }}
        run: node .github/scripts/jira-dispatch.mjs ensure-pr

      - name: Comment back on Jira
        if: env.SHOULD_RUN == 'true'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: node .github/scripts/jira-dispatch.mjs comment-result

      - name: Final status
        if: env.SHOULD_RUN == 'true'
        shell: bash
        run: |
          if [ "${CONCLUSION:-failure}" != "success" ]; then
            echo "Codex run concluded as ${CONCLUSION:-failure}; failing the workflow."
            exit 1
          fi
          echo "Codex run succeeded."
