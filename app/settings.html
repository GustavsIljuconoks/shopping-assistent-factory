<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Settings - Shopping</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #1d2522;
        --muted: #607069;
        --line: #d8ded9;
        --paper: #f7f8f4;
        --panel: #ffffff;
        --accent: #0b6b57;
        --accent-soft: #dceee8;
        font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(90deg, rgba(11, 107, 87, 0.08) 1px, transparent 1px),
          linear-gradient(180deg, rgba(11, 107, 87, 0.08) 1px, transparent 1px),
          var(--paper);
        background-size: 32px 32px;
        color: var(--ink);
      }

      .settings-shell {
        display: grid;
        grid-template-columns: minmax(180px, 260px) minmax(0, 1fr);
        min-height: 100vh;
      }

      .settings-sidebar {
        border-right: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.78);
        padding: 32px 24px;
      }

      .settings-sidebar h2 {
        margin: 0 0 24px;
        font-size: 1rem;
        letter-spacing: 0;
      }

      .settings-sidebar nav {
        display: grid;
        gap: 8px;
      }

      .settings-sidebar a {
        border-radius: 6px;
        color: var(--ink);
        display: block;
        font: 600 0.95rem ui-sans-serif, system-ui, sans-serif;
        padding: 10px 12px;
        text-decoration: none;
      }

      .settings-sidebar a[aria-current="page"] {
        background: var(--accent-soft);
        color: var(--accent);
      }

      .settings-pane {
        align-content: center;
        display: grid;
        max-width: 760px;
        padding: 56px clamp(24px, 8vw, 96px);
      }

      .settings-kicker,
      .settings-status {
        color: var(--muted);
        font: 600 0.82rem ui-sans-serif, system-ui, sans-serif;
        margin: 0;
      }

      .settings-kicker {
        text-transform: uppercase;
      }

      .settings-pane h1 {
        font-size: clamp(2.5rem, 7vw, 5.5rem);
        font-weight: 700;
        letter-spacing: 0;
        line-height: 0.95;
        margin: 12px 0 24px;
      }

      .settings-placeholder {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 18px 60px rgba(29, 37, 34, 0.08);
        font-size: 1.15rem;
        line-height: 1.55;
        margin: 0 0 18px;
        max-width: 560px;
        padding: 24px;
      }

      @media (max-width: 720px) {
        .settings-shell {
          grid-template-columns: 1fr;
        }

        .settings-sidebar {
          border-bottom: 1px solid var(--line);
          border-right: 0;
          padding: 20px;
        }

        .settings-sidebar nav {
          grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        }

        .settings-pane {
          align-content: start;
          padding: 40px 20px;
        }
      }
    </style>
  </head>
  <body>
    <main class="settings-shell" aria-label="Settings">
      <aside class="settings-sidebar" aria-label="Settings sections">
        <h2>Settings</h2>
        <nav aria-label="Settings navigation">
          <a href="#shopping" aria-current="page">Shopping</a>
        </nav>
      </aside>
      <section id="shopping" class="settings-pane" aria-labelledby="shopping-heading">
        <p class="settings-kicker">Settings</p>
        <h1 id="shopping-heading">Shopping</h1>
        <p class="settings-placeholder">Shopping preferences are in setup. Profile controls will appear here in a later milestone.</p>
        <p class="settings-status">No shopping profile data yet.</p>
      </section>
    </main>
  </body>
</html>
