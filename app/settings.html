<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Settings - Shopping</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #1d2522;
        --muted: #607069;
        --line: #d8ded9;
        --paper: #f7f8f4;
        --panel: #ffffff;
        --accent: #0b6b57;
        --accent-soft: #dceee8;
        font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(90deg, rgba(11, 107, 87, 0.08) 1px, transparent 1px),
          linear-gradient(180deg, rgba(11, 107, 87, 0.08) 1px, transparent 1px),
          var(--paper);
        background-size: 32px 32px;
        color: var(--ink);
      }

      .settings-shell {
        display: grid;
        grid-template-columns: minmax(180px, 260px) minmax(0, 1fr);
        min-height: 100vh;
      }

      .settings-sidebar {
        border-right: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.78);
        padding: 32px 24px;
      }

      .settings-sidebar h2 {
        margin: 0 0 24px;
        font-size: 1rem;
        letter-spacing: 0;
      }

      .settings-sidebar nav {
        display: grid;
        gap: 8px;
      }

      .settings-sidebar a {
        border-radius: 6px;
        color: var(--ink);
        display: block;
        font: 600 0.95rem ui-sans-serif, system-ui, sans-serif;
        padding: 10px 12px;
        text-decoration: none;
      }

      .settings-sidebar a[aria-current="page"] {
        background: var(--accent-soft);
        color: var(--accent);
      }

      .settings-pane {
        align-content: center;
        display: grid;
        max-width: 760px;
        padding: 56px clamp(24px, 8vw, 96px);
      }

      .settings-kicker,
      .settings-status {
        color: var(--muted);
        font: 600 0.82rem ui-sans-serif, system-ui, sans-serif;
        margin: 0;
      }

      .settings-kicker {
        text-transform: uppercase;
      }

      .settings-pane h1 {
        font-size: clamp(2.5rem, 7vw, 5.5rem);
        font-weight: 700;
        letter-spacing: 0;
        line-height: 0.95;
        margin: 12px 0 24px;
      }

      .settings-placeholder {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 18px 60px rgba(29, 37, 34, 0.08);
        font-size: 1.15rem;
        line-height: 1.55;
        margin: 0 0 18px;
        max-width: 560px;
        padding: 24px;
      }

      .settings-subpane {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 18px 60px rgba(29, 37, 34, 0.08);
        max-width: 600px;
        padding: 24px;
      }

      .settings-subpane h2 {
        font: 700 1.35rem ui-sans-serif, system-ui, sans-serif;
        letter-spacing: 0;
        margin: 0 0 12px;
      }

      .settings-empty-state {
        color: var(--muted);
        font: 500 1rem/1.55 ui-sans-serif, system-ui, sans-serif;
        margin: 0;
      }

      .proposal-cards {
        display: grid;
        gap: 16px;
        margin-top: 20px;
        max-width: 720px;
      }

      .proposal-cards h2 {
        font: 700 1.1rem ui-sans-serif, system-ui, sans-serif;
        margin: 0;
      }

      .proposal-card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 18px 60px rgba(29, 37, 34, 0.08);
        overflow: hidden;
      }

      .proposal-card-header,
      .proposal-card-footer,
      .proposal-staged-result {
        display: flex;
        gap: 12px;
        justify-content: space-between;
        padding: 16px;
      }

      .proposal-card-header {
        align-items: center;
        border-bottom: 1px solid var(--line);
      }

      .proposal-card-header h3,
      .proposal-candidate-body h4 {
        letter-spacing: 0;
        margin: 0;
      }

      .proposal-card-header h3 {
        font: 700 1.25rem ui-sans-serif, system-ui, sans-serif;
      }

      .proposal-card-header p,
      .proposal-candidate-brand,
      .proposal-candidate-meta,
      .proposal-candidate-reason,
      .proposal-staged-result span {
        color: var(--muted);
        font: 600 0.88rem/1.35 ui-sans-serif, system-ui, sans-serif;
        margin: 4px 0 0;
      }

      .proposal-candidate-list {
        display: grid;
        gap: 0;
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .proposal-candidate {
        align-items: center;
        border-bottom: 1px solid var(--line);
        display: grid;
        gap: 12px;
        grid-template-columns: 28px 72px minmax(0, 1fr) auto;
        padding: 14px 16px;
      }

      .proposal-candidate img {
        aspect-ratio: 1;
        background: var(--accent-soft);
        border: 1px solid var(--line);
        border-radius: 6px;
        object-fit: cover;
        width: 72px;
      }

      .proposal-candidate-select {
        display: grid;
        height: 28px;
        place-items: center;
        width: 28px;
      }

      .proposal-candidate-select input {
        height: 1px;
        opacity: 0;
        position: absolute;
        width: 1px;
      }

      .proposal-candidate-check {
        border: 2px solid var(--line);
        border-radius: 6px;
        display: block;
        height: 20px;
        width: 20px;
      }

      .proposal-candidate-select input:checked + .proposal-candidate-check {
        background: var(--accent);
        border-color: var(--accent);
        box-shadow: inset 0 0 0 4px var(--panel);
      }

      .proposal-candidate-body {
        min-width: 0;
      }

      .proposal-candidate-brand {
        text-transform: uppercase;
      }

      .proposal-candidate-body h4 {
        font: 700 1rem/1.25 ui-sans-serif, system-ui, sans-serif;
      }

      .proposal-candidate-reason {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .proposal-product-link,
      .proposal-cart-link,
      .proposal-stage-button {
        border-radius: 6px;
        font: 700 0.88rem ui-sans-serif, system-ui, sans-serif;
        text-decoration: none;
        white-space: nowrap;
      }

      .proposal-product-link,
      .proposal-cart-link {
        color: var(--accent);
      }

      .proposal-card-footer {
        align-items: center;
        color: var(--muted);
        flex-wrap: wrap;
        font: 600 0.88rem ui-sans-serif, system-ui, sans-serif;
      }

      .proposal-stage-button {
        background: var(--accent);
        border: 0;
        color: white;
        cursor: pointer;
        margin-left: auto;
        padding: 10px 14px;
      }

      .proposal-stage-button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .proposal-card--staged {
        border-color: var(--accent);
      }

      .proposal-staged-result {
        align-items: baseline;
        background: var(--accent-soft);
      }

      @media (max-width: 720px) {
        .settings-shell {
          grid-template-columns: 1fr;
        }

        .settings-sidebar {
          border-bottom: 1px solid var(--line);
          border-right: 0;
          padding: 20px;
        }

        .settings-sidebar nav {
          grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        }

        .settings-pane {
          align-content: start;
          padding: 40px 20px;
        }

        .proposal-candidate {
          grid-template-columns: 28px 64px minmax(0, 1fr);
        }

        .proposal-candidate img {
          width: 64px;
        }

        .proposal-product-link {
          grid-column: 3;
        }
      }
    </style>
  </head>
  <body>
    <main class="settings-shell" aria-label="Settings">
      <aside class="settings-sidebar" aria-label="Settings sections">
        <h2>Settings</h2>
        <nav aria-label="Settings navigation">
          <a href="#shopping">Shopping</a>
          <a href="#privacy" aria-current="page">Privacy</a>
        </nav>
      </aside>
      <section id="privacy" class="settings-pane" aria-labelledby="privacy-heading">
        <p class="settings-kicker">Settings</p>
        <h1 id="privacy-heading">Privacy</h1>
        <section class="settings-subpane" aria-labelledby="shopping-activity-heading">
          <h2 id="shopping-activity-heading">Shopping activity</h2>
          <p class="settings-empty-state">No shopping activity has been recorded yet.</p>
        </section>
      </section>
    </main>
  </body>
</html>
